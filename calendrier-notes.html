<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Carnet">
<meta name="theme-color" content="#FAF8F4">
<!-- Icône générée via canvas au chargement -->
<title>Carnet</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --cream: #FAF8F4;
    --white: #FFFFFF;
    --ink: #1C1917;
    --ink-light: #78716C;
    --terra: #C4704A;
    --terra-light: #E8C4B0;
    --rule: #E8E0D5;
    --rule-dark: #D4C9BE;
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 34px);
  }

  html, body {
    height: 100%;
    background: var(--cream);
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    color: var(--ink);
  }

  #app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── HEADER ── */
  #cal-header {
    background: var(--terra);
    padding: calc(var(--safe-top) + 12px) 20px 14px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  #cal-header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.01em;
    text-transform: capitalize;
  }

  .nav-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
  }
  .nav-btn:active { background: rgba(255,255,255,0.35); }

  /* ── CALENDRIER ── */
  #calendar-view {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--cream);
  }

  #weekdays {
    display: grid;
    grid-template-columns: repeat(7,1fr);
    background: var(--white);
    border-bottom: 1px solid var(--rule);
    padding: 8px 6px 6px;
  }

  #weekdays span {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--ink-light);
    text-transform: uppercase;
  }
  #weekdays span.weekend { color: var(--terra); }

  #days-grid {
    display: grid;
    grid-template-columns: repeat(7,1fr);
    gap: 1px;
    background: var(--rule);
    flex: 1;
    overflow: hidden;
  }

  .day-cell {
    background: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 2px 6px;
    cursor: pointer;
    position: relative;
    transition: background 0.12s;
    min-height: 0;
    gap: 4px;
  }
  .day-cell:active { background: #FFF0E8; }
  .day-cell.other-month .day-num { color: #C8BFB8; }

  /* Aujourd'hui : cercle terracotta, texte BLANC (priorité max) */
  .day-cell.today .day-num {
    background: var(--terra);
    color: #fff !important;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Case avec note : fond terracotta pâle + trait gauche */
  .day-cell.has-note {
    background: #FDF0E8;
  }
  .day-cell.has-note:active { background: #F7DDD0; }
  /* Aujourd'hui + note : anneau blanc autour du cercle */
  .day-cell.today.has-note .day-num {
    box-shadow: 0 0 0 2px #fff;
  }

  .day-num {
    font-size: 15px;
    font-weight: 500;
    line-height: 1;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .day-cell.weekend .day-num { color: var(--terra); }
  .day-cell.other-month.weekend .day-num { color: var(--terra-light); }
  /* today sur weekend : toujours blanc */
  .day-cell.today.weekend .day-num { color: #fff !important; }

  /* ── NOTE PANEL ── */
  #note-panel {
    position: fixed;
    left: 0; right: 0; top: 0; bottom: 0;
    z-index: 100;
    pointer-events: none;
    display: flex;
    flex-direction: column;
  }

  #note-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(28,25,23,0);
    transition: background 0.35s ease;
  }

  #note-sheet {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: calc(100dvh - 60px - var(--safe-top));
    background: var(--white);
    border-radius: 20px 20px 0 0;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.32,0.72,0,1);
    display: flex;
    flex-direction: column;
    box-shadow: 0 -4px 30px rgba(28,25,23,0.12);
    overflow: hidden;
  }

  #note-panel.open { pointer-events: all; }
  #note-panel.open #note-backdrop { background: rgba(28,25,23,0.25); }
  #note-panel.open #note-sheet { transform: translateY(0); }

  /* Drag handle */
  #drag-handle {
    width: 36px; height: 4px;
    background: var(--rule-dark);
    border-radius: 2px;
    margin: 10px auto 0;
    flex-shrink: 0;
  }

  /* Sheet header */
  #note-sheet-header {
    background: var(--terra);
    color: white;
    padding: 12px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  #note-date-label {
    font-size: 15px;
    font-weight: 600;
    text-transform: capitalize;
  }

  #close-note-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 30px; height: 30px;
    border-radius: 50%;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    line-height: 1;
  }
  #close-note-btn:active { background: rgba(255,255,255,0.35); }

  /* Zone note */
  #note-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    background: var(--white);
    position: relative;
  }

  #note-textarea {
    width: 100%;
    min-height: 100%;
    padding: 16px 20px 80px 52px;
    font-size: 16px;
    line-height: 32px;
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    color: var(--ink);
    border: none;
    outline: none;
    resize: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 31px,
      var(--rule) 31px,
      var(--rule) 32px
    );
    background-size: 100% 32px;
    background-position: 0 16px;
    caret-color: var(--terra);
  }

  /* Marge rouge */
  #note-body::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: 40px;
    width: 1px;
    background: var(--terra-light);
    pointer-events: none;
  }

  /* Placeholder */
  .note-hint {
    position: absolute;
    top: 20px;
    left: 52px;
    right: 20px;
    color: var(--rule-dark);
    font-size: 15px;
    pointer-events: none;
    line-height: 32px;
  }

  /* Bouton save flottant */
  #save-note-btn {
    position: absolute;
    bottom: calc(var(--safe-bottom) + 16px);
    right: 20px;
    background: var(--terra);
    color: white;
    border: none;
    width: 50px; height: 50px;
    border-radius: 50%;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 3px 14px rgba(196,112,74,0.45);
    z-index: 10;
  }
  #save-note-btn:active { transform: scale(0.92); }

  /* ── BARRE BAS ── */
  #bottom-bar {
    background: var(--white);
    border-top: 1px solid var(--rule);
    padding: 10px 24px calc(var(--safe-bottom) + 6px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  #today-display { display: flex; flex-direction: column; align-items: flex-start; }

  #today-display .today-label {
    font-size: 10px; letter-spacing: 0.08em;
    font-weight: 600; text-transform: uppercase; color: var(--ink-light);
  }

  #today-display .today-date {
    font-size: 20px; font-weight: 700; color: var(--ink);
    line-height: 1.1; text-transform: capitalize;
  }

  #today-display .today-time {
    font-size: 12px; color: var(--ink-light);
    font-variant-numeric: tabular-nums;
  }

  #today-btn {
    background: var(--terra); color: white; border: none;
    padding: 10px 18px; border-radius: 20px;
    font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  #today-btn:active { opacity: 0.8; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    top: calc(var(--safe-top) + 10px);
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--ink);
    color: white;
    font-size: 13px; font-weight: 500;
    padding: 8px 18px; border-radius: 20px;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="app">
  <div id="cal-header">
    <button class="nav-btn" id="prev-btn">‹</button>
    <h1 id="month-title">—</h1>
    <button class="nav-btn" id="next-btn">›</button>
  </div>

  <div id="calendar-view">
    <div id="weekdays">
      <span>Lu</span><span>Ma</span><span>Me</span><span>Je</span><span>Ve</span>
      <span class="weekend">Sa</span><span class="weekend">Di</span>
    </div>
    <div id="days-grid"></div>
  </div>

  <div id="bottom-bar">
    <div id="today-display">
      <span class="today-label">Aujourd'hui</span>
      <span class="today-date" id="today-full">—</span>
      <span class="today-time" id="clock">—</span>
    </div>
    <button id="today-btn">Ce jour</button>
  </div>
</div>

<!-- PANNEAU NOTE -->
<div id="note-panel">
  <div id="note-backdrop"></div>
  <div id="note-sheet">
    <div id="drag-handle"></div>
    <div id="note-sheet-header">
      <span id="note-date-label">—</span>
      <button id="close-note-btn">×</button>
    </div>
    <div id="note-body">
      <span class="note-hint" id="note-hint">Écrivez votre note ici…</span>
      <textarea id="note-textarea" spellcheck="true" autocorrect="on"></textarea>
    </div>
    <button id="save-note-btn" title="Enregistrer">✓</button>
  </div>
</div>

<div id="toast"></div>

<script>
(function() {
  'use strict';

  const STORE_KEY = 'carnet_notes_v1';
  let notes = {};
  let currentYear, currentMonth;
  let openDateKey = null;

  const today = new Date();
  const todayKey = fmtKey(today.getFullYear(), today.getMonth(), today.getDate());

  try { notes = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e) { notes = {}; }

  function saveAll() { localStorage.setItem(STORE_KEY, JSON.stringify(notes)); }

  function fmtKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  currentYear  = today.getFullYear();
  currentMonth = today.getMonth();
  renderCalendar();
  updateTodayDisplay();
  startClock();

  // ── CALENDRIER
  function renderCalendar() {
    const months = ['Janvier','Février','Mars','Avril','Mai','Juin',
                    'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    document.getElementById('month-title').textContent =
      `${months[currentMonth]} ${currentYear}`;

    const grid = document.getElementById('days-grid');
    grid.innerHTML = '';

    const firstDay    = new Date(currentYear, currentMonth, 1).getDay();
    const startOffset = (firstDay === 0) ? 6 : firstDay - 1;
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const daysInPrev  = new Date(currentYear, currentMonth, 0).getDate();
    const totalCells  = Math.ceil((startOffset + daysInMonth) / 7) * 7;

    for (let i = 0; i < totalCells; i++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      let d, m, y, other = false;

      if (i < startOffset) {
        d = daysInPrev - startOffset + 1 + i; m = currentMonth - 1; y = currentYear;
        if (m < 0) { m = 11; y--; }
        other = true;
      } else if (i >= startOffset + daysInMonth) {
        d = i - startOffset - daysInMonth + 1; m = currentMonth + 1; y = currentYear;
        if (m > 11) { m = 0; y++; }
        other = true;
      } else {
        d = i - startOffset + 1; m = currentMonth; y = currentYear;
      }

      const key = fmtKey(y, m, d);
      const dow = i % 7; // 0=Lun … 6=Dim

      if (other)        cell.classList.add('other-month');
      if (dow >= 5)     cell.classList.add('weekend');
      if (key === todayKey) cell.classList.add('today');
      if (notes[key] && notes[key].trim()) cell.classList.add('has-note');

      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = d;
      cell.appendChild(numEl);

      cell.addEventListener('click', () => openNote(y, m, d, key));
      grid.appendChild(cell);
    }
  }

  // ── NOTE
  function openNote(y, m, d, key) {
    openDateKey = key;
    const jours = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
    const mois  = ['janvier','février','mars','avril','mai','juin',
                   'juillet','août','septembre','octobre','novembre','décembre'];
    const date  = new Date(y, m, d);
    document.getElementById('note-date-label').textContent =
      `${jours[date.getDay()]} ${d} ${mois[m]} ${y}`;

    const ta = document.getElementById('note-textarea');
    ta.value = notes[key] || '';
    document.getElementById('note-hint').style.display = ta.value ? 'none' : 'block';

    document.getElementById('note-panel').classList.add('open');
    requestAnimationFrame(() => requestAnimationFrame(() => ta.focus()));
  }

  function autoSave() {
    if (!openDateKey) return;
    const val = document.getElementById('note-textarea').value.trim();
    if (val) { notes[openDateKey] = val; }
    else     { delete notes[openDateKey]; }
    saveAll();
    renderCalendar();
  }

  function closeNote() {
    document.getElementById('note-panel').classList.remove('open');
    document.getElementById('note-textarea').blur();
    openDateKey = null;
  }

  function saveAndClose() {
    autoSave();
    showToast('Note enregistrée');
    closeNote();
  }

  // ── EVENTS
  document.getElementById('prev-btn').addEventListener('click', () => {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
  });

  document.getElementById('next-btn').addEventListener('click', () => {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
  });

  document.getElementById('today-btn').addEventListener('click', () => {
    currentYear  = today.getFullYear();
    currentMonth = today.getMonth();
    renderCalendar();
  });

  document.getElementById('close-note-btn').addEventListener('click', () => {
    autoSave(); closeNote();
  });

  document.getElementById('save-note-btn').addEventListener('click', saveAndClose);

  document.getElementById('note-backdrop').addEventListener('click', () => {
    autoSave(); closeNote();
  });

  document.getElementById('note-textarea').addEventListener('input', () => {
    const ta = document.getElementById('note-textarea');
    document.getElementById('note-hint').style.display = ta.value ? 'none' : 'block';
  });

  // Swipe bas pour fermer
  let touchStartY = 0;
  const sheet = document.getElementById('note-sheet');
  sheet.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive:true});
  sheet.addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - touchStartY > 80) { autoSave(); closeNote(); }
  }, {passive:true});

  // ── BARRE BAS
  function updateTodayDisplay() {
    const j = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    const mo = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];
    const t = new Date();
    document.getElementById('today-full').textContent =
      `${j[t.getDay()]} ${t.getDate()} ${mo[t.getMonth()]}`;
  }

  function startClock() {
    function tick() {
      const t = new Date();
      document.getElementById('clock').textContent =
        `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
    }
    tick();
    setInterval(tick, 1000);
  }

  // ── TOAST
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = '✓ ' + msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ── ICÔNE ÉCRAN D'ACCUEIL (PNG via Canvas — seul format accepté par iOS)
  function generateAppleTouchIcon() {
    try {
      const S = 180;
      const cv = document.createElement('canvas');
      cv.width = cv.height = S;
      const g = cv.getContext('2d');

      function rrect(x, y, w, h, tl, tr, br, bl) {
        g.beginPath();
        g.moveTo(x + tl, y);
        g.lineTo(x + w - tr, y);
        g.quadraticCurveTo(x+w, y, x+w, y+tr);
        g.lineTo(x+w, y+h-br);
        g.quadraticCurveTo(x+w, y+h, x+w-br, y+h);
        g.lineTo(x+bl, y+h);
        g.quadraticCurveTo(x, y+h, x, y+h-bl);
        g.lineTo(x, y+tl);
        g.quadraticCurveTo(x, y, x+tl, y);
        g.closePath();
      }

      // Fond crème
      rrect(0,0,S,S,36,36,36,36);
      g.fillStyle = '#FAF8F4';
      g.fill();

      // Carnet blanc avec ombre subtile
      g.shadowColor = 'rgba(28,25,23,0.1)';
      g.shadowBlur = 6;
      g.shadowOffsetY = 2;
      rrect(18,26,144,132, 10,10,10,10);
      g.fillStyle = '#FFFFFF';
      g.fill();
      g.shadowColor = 'transparent';

      // En-tête terracotta
      rrect(18,26,144,36, 10,10,0,0);
      g.fillStyle = '#C4704A';
      g.fill();

      // Texte "CARNET"
      g.fillStyle = '#FFFFFF';
      g.font = 'bold 13px sans-serif';
      g.textAlign = 'center';
      g.textBaseline = 'middle';
      g.fillText('CARNET', S/2, 44);

      // Lignes réglées
      g.strokeStyle = '#E8E0D5';
      g.lineWidth = 1;
      for (let ly = 76; ly < 155; ly += 19) {
        g.beginPath(); g.moveTo(30, ly); g.lineTo(150, ly); g.stroke();
      }

      // Marge rose
      g.strokeStyle = '#E8C4B0';
      g.lineWidth = 1.5;
      g.beginPath(); g.moveTo(50, 62); g.lineTo(50, 155); g.stroke();

      // Numéro du jour dans un cercle terracotta en bas
      const dayNum = String(new Date().getDate());
      g.beginPath();
      g.arc(S/2, 153, 21, 0, Math.PI*2);
      g.fillStyle = '#C4704A';
      g.fill();

      g.fillStyle = '#FFFFFF';
      g.font = 'bold 22px sans-serif';
      g.textAlign = 'center';
      g.textBaseline = 'middle';
      g.fillText(dayNum, S/2, 153);

      // Injecter dans <head>
      const link = document.createElement('link');
      link.rel = 'apple-touch-icon';
      link.setAttribute('sizes', '180x180');
      link.href = cv.toDataURL('image/png');
      document.head.appendChild(link);
    } catch(e) { /* canvas indisponible */ }
  }

  generateAppleTouchIcon();

})();
</script>
</body>
</html>
