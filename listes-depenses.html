<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dépenses">
<title>Dépenses</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%231e2433'/%3E%3Crect x='30' y='52' width='120' height='14' rx='7' fill='%233b6ff0'/%3E%3Crect x='30' y='78' width='80' height='10' rx='5' fill='%23ffffff' opacity='.4'/%3E%3Crect x='30' y='98' width='100' height='10' rx='5' fill='%23ffffff' opacity='.3'/%3E%3Crect x='30' y='118' width='60' height='10' rx='5' fill='%23ffffff' opacity='.2'/%3E%3Crect x='110' y='108' width='40' height='22' rx='6' fill='%23e8ff47'/%3E%3Ctext x='130' y='124' font-family='Arial' font-size='13' font-weight='bold' fill='%23000' text-anchor='middle'%3E€%3C/text%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231e2433'/%3E%3Crect x='5' y='9' width='22' height='3' rx='1.5' fill='%233b6ff0'/%3E%3Crect x='5' y='14' width='14' height='2' rx='1' fill='%23ffffff' opacity='.5'/%3E%3Crect x='5' y='18' width='18' height='2' rx='1' fill='%23ffffff' opacity='.35'/%3E%3Crect x='5' y='22' width='10' height='2' rx='1' fill='%23ffffff' opacity='.2'/%3E%3Crect x='19' y='19' width='8' height='5' rx='2' fill='%23e8ff47'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--sidebar:#1e2433;--sidebar-hover:#2a3147;
  --card:#ffffff;--card-border:#e2e8f0;--header:#ffffff;
  --accent:#3b6ff0;--accent-light:#eef2fe;
  --accent2:#10b981;--accent2-light:#ecfdf5;
  --danger:#ef4444;--danger-light:#fef2f2;
  --text:#1a202c;--text2:#64748b;--text3:#94a3b8;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{background:var(--header);border-bottom:1px solid var(--card-border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.logo{font-size:1rem;font-weight:700;color:var(--text);letter-spacing:.02em}
.save-status{font-size:.7rem;color:var(--accent2);display:flex;align-items:center;gap:.35rem}
.save-dot{width:6px;height:6px;background:var(--accent2);border-radius:50%}

/* LAYOUT */
.main{display:flex;flex:1}

/* SIDEBAR */
.sidebar{width:220px;min-height:calc(100vh - 56px);background:var(--sidebar);padding:1.25rem .75rem;display:flex;flex-direction:column;gap:.25rem;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;flex-shrink:0}
.sidebar-title{font-size:.65rem;color:#4a5568;letter-spacing:.1em;text-transform:uppercase;padding:.5rem .75rem .25rem;font-weight:600}
.sidebar-item{display:flex;align-items:center;justify-content:space-between;padding:.55rem .75rem;border-radius:6px;font-size:.8rem;color:#94a3b8;gap:.5rem}
.sidebar-item .si-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-item .si-total{font-family:var(--mono);font-size:.7rem;opacity:.8;white-space:nowrap}
.sidebar-add{margin-top:.5rem;padding:.55rem .75rem;border-radius:6px;border:1px dashed #2a3147;color:#4a5568;font-size:.78rem;cursor:pointer;text-align:center;transition:all .15s;background:none;width:100%;font-family:var(--sans)}
.sidebar-add:hover{border-color:var(--accent);color:var(--accent)}
.sidebar-footer{margin-top:auto;padding-top:1rem;border-top:1px solid #2a3147}
.grand-total-side{background:#252d3f;border-radius:8px;padding:.75rem}
.gts-label{font-size:.65rem;color:#4a5568;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.gts-val{font-family:var(--mono);font-size:1.15rem;font-weight:600;color:#e8ff47;margin-top:.2rem}
.gts-sub{font-size:.65rem;color:#4a5568;margin-top:.15rem}

/* CONTENT */
.content{flex:1;padding:1.5rem;overflow-y:auto;min-width:0}
.content-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.content-title{font-size:1rem;font-weight:600;color:var(--text)}
.content-actions{display:flex;gap:.5rem;flex-wrap:wrap}
.btn-icon{background:var(--card);border:1px solid var(--card-border);color:var(--text2);padding:.4rem .75rem;border-radius:6px;font-size:.75rem;font-family:var(--sans);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:.35rem;font-weight:500}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}
.btn-icon.danger:hover{border-color:var(--danger);color:var(--danger);background:var(--danger-light)}
.btn-icon.green{border-color:var(--accent2);color:var(--accent2)}
.btn-icon.green:hover{background:var(--accent2-light)}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:.4rem .85rem;border-radius:6px;font-size:.75rem;font-family:var(--sans);cursor:pointer;font-weight:600;transition:all .15s}
.btn-primary:hover{background:#2d5ce0}

/* CARD */
.list-card{background:var(--card);border:1px solid var(--card-border);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:box-shadow .15s}
.list-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.08)}
.card-header{display:flex;align-items:center;gap:.75rem;padding:.85rem 1.1rem;background:#fafbfc;cursor:pointer;user-select:none;transition:background .15s}
.card-header:hover{background:#f1f4f8}
.card-number{width:24px;height:24px;background:var(--accent-light);color:var(--accent);border-radius:5px;font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-title-input{flex:1;background:transparent;border:none;color:var(--text);font-family:var(--sans);font-weight:600;font-size:.88rem;outline:none;cursor:text}
.card-title-input::placeholder{color:var(--text3)}
.card-meta{font-size:.68rem;color:var(--text3);white-space:nowrap}
.collapse-btn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:.7rem;transition:transform .2s;flex-shrink:0}
.list-card.collapsed .collapse-btn{transform:rotate(-90deg)}
.card-body{border-top:1px solid var(--card-border)}
.list-card.collapsed .card-body{display:none}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{font-size:.65rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);padding:.5rem 1.1rem;text-align:left;border-bottom:1px solid var(--card-border);background:#fafbfc}
thead th.th-price{text-align:right;width:120px}
thead th:last-child{width:36px}
tbody tr{transition:background .1s}
tbody tr:hover{background:#fafbfc}
tbody td{padding:0;border-bottom:1px solid #f1f5f9}
tbody tr:last-child td{border-bottom:none}
td input{background:transparent;border:none;color:var(--text);font-family:var(--sans);font-size:.82rem;padding:.65rem 1.1rem;outline:none;width:100%}
td input::placeholder{color:var(--text3)}
td.td-price input{font-family:var(--mono);font-size:.8rem;color:var(--accent);text-align:right;padding-right:1.1rem}
td.td-del{text-align:right;padding-right:.75rem}
.btn-del-row{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.85rem;line-height:1;padding:.2rem .35rem;border-radius:3px;transition:all .15s}
.btn-del-row:hover{color:var(--danger);background:var(--danger-light)}

/* CARD FOOTER */
.card-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;padding:.7rem 1.1rem;background:#fafbfc;border-top:1px solid var(--card-border)}
.btn-add-row{background:none;border:none;color:var(--accent);font-family:var(--sans);font-size:.75rem;font-weight:500;cursor:pointer;padding:.2rem 0;display:inline-flex;align-items:center;gap:.3rem}
.btn-add-row:hover{text-decoration:underline}
.total-pill{display:flex;align-items:center;gap:.5rem;background:var(--accent-light);border-radius:6px;padding:.35rem .75rem}
.tp-label{font-size:.65rem;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.tp-val{font-family:var(--mono);font-size:.85rem;font-weight:600;color:var(--accent)}

/* CSV BAR */
.csv-bar{background:var(--card);border-top:1px solid var(--card-border);padding:.7rem 1.5rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.csv-btn{flex:1;padding:.6rem;border-radius:8px;font-family:var(--sans);font-size:.8rem;font-weight:600;cursor:pointer;border:none;transition:opacity .15s;text-align:center}
.csv-btn{background:#1e2433;color:#e2e8f0}
.csv-btn:hover{opacity:.85}
.csv-btn-green{background:var(--accent2);color:#fff}

.csv-file-input{display:none}
.empty-list{text-align:center;padding:2.5rem;color:var(--text3);font-size:.8rem}
.toast{position:fixed;bottom:4rem;right:1.5rem;background:#1e2433;color:#e2e8f0;padding:.6rem 1rem;border-radius:8px;font-size:.75rem;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;max-width:260px}
.toast.show{opacity:1;transform:translateY(0)}

@media(max-width:640px){.sidebar{display:none}.content{padding:1rem}}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">DEPENSES</span>
  <span class="save-status"><span class="save-dot"></span>Sauvegarde auto</span>
</div>

<div class="main">

  <aside class="sidebar">
    <div class="sidebar-title">Listes</div>
    <div id="sidebar-items"></div>
    <button class="sidebar-add" onclick="addList()">+ Nouvelle liste</button>
    <div class="sidebar-footer">
      <div class="grand-total-side">
        <div class="gts-label">Total journee</div>
        <div class="gts-val" id="gts-val">0,00 E</div>
        <div class="gts-sub" id="gts-sub">0 liste . 0 entree</div>
      </div>
    </div>
  </aside>

  <div class="content">
    <div class="content-header">
      <span class="content-title">Toutes les listes</span>
      <div class="content-actions">
        <button class="btn-primary" onclick="addList()">+ Nouvelle liste</button>
      </div>
    </div>
    <div id="cards-container" style="display:flex;flex-direction:column;gap:1rem"></div>
    <div class="empty-list" id="empty-msg" style="display:none">Aucune liste — cliquez sur « + Nouvelle liste »</div>
  </div>

</div>

<div class="csv-bar">
  <button class="csv-btn-ios" onclick="exportAllCSV()"><span class="csv-ios-icon">⬇</span> CSV</button>
  <button class="csv-btn-ios csv-btn-ios-green" onclick="triggerImportAll()"><span class="csv-ios-icon">⬆</span> CSV</button>
</div>

<input type="file" id="import-all-input" class="csv-file-input" accept=".csv,text/csv" onchange="handleImportAll(event)">
<div class="toast" id="toast"></div>

<script>
var STORAGE_KEY = 'depenses_v3';
var lists = [], collapsed = {}, idSeq = 100;
function uid() { return ++idSeq; }

function load() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var d = JSON.parse(raw);
      lists = d.lists || [];
      idSeq = d.idSeq || 100;
      collapsed = d.collapsed || {};
    }
  } catch(e) {}
  try {
    var raw2 = localStorage.getItem('depenses_v2');
    if (raw2) {
      var d2 = JSON.parse(raw2);
      var oldLists = d2.lists || [];
      if (oldLists.length) {
        var existingIds = {};
        for (var i = 0; i < lists.length; i++) existingIds[lists[i].id] = true;
        for (var j = 0; j < oldLists.length; j++) {
          if (!existingIds[oldLists[j].id]) lists.push(oldLists[j]);
        }
        localStorage.removeItem('depenses_v2');
      }
    }
  } catch(e) {}
  if (!lists.length) lists = [{ id: uid(), name: 'Liste 1', entries: [] }];
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ lists: lists, idSeq: idSeq, collapsed: collapsed }));
  showToast('Sauvegarde OK');
}

function addList() {
  var l = { id: uid(), name: 'Nouvelle liste', entries: [] };
  lists.push(l);
  collapsed[l.id] = false;
  render(); save();
  setTimeout(function() {
    var all = document.querySelectorAll('.card-title-input');
    if (all.length) { var last = all[all.length-1]; last.focus(); last.select(); }
  }, 40);
}

function deleteList(id, e) {
  e.stopPropagation();
  lists = lists.filter(function(l) { return l.id !== id; });
  delete collapsed[id];
  render(); save();
}

function toggleCollapse(id) {
  collapsed[id] = !collapsed[id];
  render();
  save();
}

function updateListName(id, val) {
  var l = find(lists, id);
  if (l) { l.name = val; renderSidebar(); save(); }
}

function addEntry(listId) {
  var l = find(lists, listId);
  if (!l) return;
  l.entries.push({ id: uid(), label: '', price: '' });
  render(); save();
  setTimeout(function() {
    var rows = document.querySelectorAll('[data-list="' + listId + '"] .label-inp');
    if (rows.length) rows[rows.length-1].focus();
  }, 40);
}

function deleteEntry(listId, entryId) {
  var l = find(lists, listId);
  if (!l) return;
  l.entries = l.entries.filter(function(e) { return e.id !== entryId; });
  render(); save();
}

function updateEntry(listId, entryId, field, val) {
  var l = find(lists, listId);
  if (!l) return;
  var e = find(l.entries, entryId);
  if (e) { e[field] = val; renderTotals(); save(); }
}

function exportAllCSV() {
  if (!lists.length) { showToast('Aucune liste a exporter'); return; }
  var rows = [['Liste', 'Description', 'Montant (EUR)']];
  for (var i = 0; i < lists.length; i++) {
    var l = lists[i];
    if (!l.entries.length) {
      rows.push([csvCell(l.name), '', '']);
    } else {
      for (var j = 0; j < l.entries.length; j++) {
        rows.push([csvCell(l.name), csvCell(l.entries[j].label), csvCell(l.entries[j].price)]);
      }
    }
    rows.push([csvCell(l.name), 'TOTAL', listTotal(l).toFixed(2)]);
    rows.push(['', '', '']);
  }
  var csv = rows.map(function(r) { return r.join(';'); }).join('\r\n');
  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var date = new Date().toLocaleDateString('fr-FR').replace(/\//g, '-');
  a.href = url; a.download = 'depenses-' + date + '.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('Export OK (' + lists.length + ' listes)');
}

function exportCSV(listId, e) {
  e.stopPropagation();
  var l = find(lists, listId);
  if (!l) return;
  var rows = [['Description','Montant (EUR)']];
  l.entries.forEach(function(en) { rows.push([csvCell(en.label), csvCell(en.price)]); });
  rows.push(['TOTAL', listTotal(l).toFixed(2)]);
  var csv = rows.map(function(r) { return r.join(';'); }).join('\r\n');
  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = (l.name || 'liste') + '.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('CSV exporte');
}

function csvCell(s) {
  s = (s || '').toString();
  if (s.indexOf(';') >= 0 || s.indexOf('"') >= 0 || s.indexOf('\n') >= 0)
    return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function triggerImportList(listId, e) {
  e.stopPropagation();
  var input = document.getElementById('import-input-' + listId);
  if (input) { input.value = ''; input.click(); }
}

function triggerImportAll() {
  var input = document.getElementById('import-all-input');
  input.value = ''; input.click();
}

function handleImportAll(event) {
  var file = event.target.files[0];
  if (!file) return;
  var name = file.name.replace(/\.csv$/i, '') || 'Import CSV';
  var reader = new FileReader();
  reader.onload = function(ev) {
    var entries = parseCSVEntries(ev.target.result);
    if (!entries) return;
    var newList = { id: uid(), name: name, entries: entries };
    lists.push(newList);
    collapsed[newList.id] = false;
    render(); save();
    showToast(entries.length + ' entrees importees');
  };
  reader.readAsText(file, 'UTF-8');
}

function handleImportInto(listId, event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var entries = parseCSVEntries(ev.target.result);
    if (!entries) return;
    var l = find(lists, listId);
    if (!l) return;
    l.entries = l.entries.concat(entries);
    render(); save();
    showToast(entries.length + ' entrees importees');
  };
  reader.readAsText(file, 'UTF-8');
}

function parseCSVEntries(text) {
  text = text.replace(/^\uFEFF/, '');
  var lines = text.split(/\r?\n/).filter(function(l) { return l.trim(); });
  if (!lines.length) { showToast('Fichier vide'); return null; }
  var sep = lines[0].indexOf(';') >= 0 ? ';' : ',';
  var firstCells = splitCSVLine(lines[0], sep);
  var start = (firstCells.length >= 1 && isNaN(parseFloat(firstCells[1]))) ? 1 : 0;
  var entries = [];
  for (var i = start; i < lines.length; i++) {
    var cells = splitCSVLine(lines[i], sep);
    if (!cells.length) continue;
    var label = cells[0] || '';
    if (label.toUpperCase() === 'TOTAL') continue;
    var price = cells[1] ? cells[1].replace(',', '.').replace(/[^\d.]/g, '') : '';
    entries.push({ id: uid(), label: label, price: price });
  }
  if (!entries.length) { showToast('Aucune entree trouvee'); return null; }
  return entries;
}

function splitCSVLine(line, sep) {
  var result = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === sep && !inQ) { result.push(cur.trim()); cur = ''; continue; }
    cur += c;
  }
  result.push(cur.trim());
  return result;
}

function find(arr, id) {
  for (var i = 0; i < arr.length; i++) if (arr[i].id === id) return arr[i];
  return null;
}

function parsePrice(s) {
  if (!s) return 0;
  var n = parseFloat((s + '').replace(',', '.'));
  return isNaN(n) ? 0 : n;
}
function fmt(n) { return n.toFixed(2).replace('.', ',') + ' \u20ac'; }
function listTotal(l) {
  return l.entries.reduce(function(s, e) { return s + parsePrice(e.price); }, 0);
}
function grandTotal() {
  return lists.reduce(function(s, l) { return s + listTotal(l); }, 0);
}
function totalEntries() {
  return lists.reduce(function(s, l) { return s + l.entries.length; }, 0);
}
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  renderCards();
  renderSidebar();
  document.getElementById('empty-msg').style.display = lists.length ? 'none' : 'block';
}

function renderCards() {
  var c = document.getElementById('cards-container');
  c.innerHTML = '';
  for (var idx = 0; idx < lists.length; idx++) {
    var list = lists[idx];
    var isCollapsed = !!collapsed[list.id];
    var card = document.createElement('div');
    card.className = 'list-card' + (isCollapsed ? ' collapsed' : '');
    card.setAttribute('data-list', list.id);

    var rows = '';
    for (var j = 0; j < list.entries.length; j++) {
      var e = list.entries[j];
      rows += '<tr>' +
        '<td><input class="label-inp" type="text" placeholder="Description..." value="' + esc(e.label) + '"' +
        ' oninput="updateEntry(' + list.id + ',' + e.id + ',\'label\',this.value)"' +
        ' onclick="event.stopPropagation()"></td>' +
        '<td class="td-price"><input type="text" placeholder="0,00" value="' + esc(e.price) + '"' +
        ' oninput="updateEntry(' + list.id + ',' + e.id + ',\'price\',this.value)"' +
        ' onclick="event.stopPropagation()"' +
        ' onkeydown="if(event.key===\'Enter\'){event.preventDefault();addEntry(' + list.id + ')}"></td>' +
        '<td class="td-del"><button class="btn-del-row" onclick="event.stopPropagation();deleteEntry(' + list.id + ',' + e.id + ')">✕</button></td>' +
        '</tr>';
    }
    if (!rows) rows = '<tr><td colspan="3" style="text-align:center;padding:1.25rem;color:#94a3b8;font-size:.78rem">Aucune entree</td></tr>';

    var entriesLabel = list.entries.length + (list.entries.length !== 1 ? ' entrees' : ' entree');

    card.innerHTML =
      '<div class="card-header" onclick="toggleCollapse(' + list.id + ')">' +
        '<input class="card-title-input" type="text" placeholder="Nom de la liste..." value="' + esc(list.name) + '"' +
        ' oninput="updateListName(' + list.id + ',this.value)" onclick="event.stopPropagation()">' +
        '<button onclick="deleteList(' + list.id + ',event)" style="background:none;border:none;color:#ef4444;font-size:1rem;cursor:pointer;padding:.1rem .3rem;flex-shrink:0" title="Supprimer">✕</button>' +
        '<div class="collapse-btn">' + (isCollapsed ? '▶' : '▼') + '</div>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="table-wrap"><table>' +
          '<thead><tr><th>Description</th><th class="th-price">Montant</th><th></th></tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table></div>' +
        '<div class="card-footer">' +
          '<button class="btn-add-row" onclick="addEntry(' + list.id + ')">+ Ajouter</button>' +
          '<div class="total-pill"><span class="tp-label">Total</span><span class="tp-val">' + fmt(listTotal(list)) + '</span></div>' +
        '</div>' +
      '</div>';

    c.appendChild(card);
  }
}

function renderSidebar() {
  var c = document.getElementById('sidebar-items');
  var html = '';
  for (var i = 0; i < lists.length; i++) {
    var l = lists[i];
    html += '<div class="sidebar-item">' +
      '<span class="si-name">' + (esc(l.name) || 'Sans nom') + '</span>' +
      '<span class="si-total">' + fmt(listTotal(l)) + '</span>' +
      '</div>';
  }
  c.innerHTML = html;
  document.getElementById('gts-val').textContent = fmt(grandTotal());
  var te = totalEntries();
  document.getElementById('gts-sub').textContent =
    lists.length + (lists.length > 1 ? ' listes' : ' liste') + ' \u00b7 ' +
    te + (te > 1 ? ' entrees' : ' entree');
}

function renderTotals() {
  for (var i = 0; i < lists.length; i++) {
    var l = lists[i];
    var card = document.querySelector('[data-list="' + l.id + '"]');
    if (!card) continue;
    var pill = card.querySelector('.tp-val');
    if (pill) pill.textContent = fmt(listTotal(l));
    var meta = card.querySelector('.card-meta');
    if (meta) meta.textContent = l.entries.length + (l.entries.length !== 1 ? ' entrees' : ' entree') + ' \u00b7 ' + fmt(listTotal(l));
  }
  renderSidebar();
}

var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2000);
}

load();
render();
</script>
</body>
</html>
